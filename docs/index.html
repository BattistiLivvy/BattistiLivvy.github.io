<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forbidden</title>

<style>
body {
    margin: 0;
    background: black;
    color: #d1c7c7;
    font-family: "Times New Roman", serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

.container {
    max-width: 600px;
}

.line {
    opacity: 0;
    font-size: 22px;
    margin: 20px 0;
    transition: opacity 2s ease;
}

.show {
    opacity: 1;
}

/* fumaça */
body::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(120,0,0,0.2) 0%, transparent 70%);
    animation: smoke 20s infinite linear;
}

@keyframes smoke {
    from { transform: translate(0,0); }
    to { transform: translate(-200px, -200px); }
}
</style>
</head>

<body>

<div class="container">
    <div class="line">You are not welcome here.</div>
    <div class="line">He is her Greek God — only hers.</div>
    <div class="line">She walks under divine protection.</div>
    <div class="line">No harm reaches what belongs to him.</div>
    <div class="line">Stay away… or be forgotten.</div>
</div>

<script>
const lines = document.querySelectorAll(".line");

let delay = 2000; // tempo entre frases

lines.forEach((line, index) => {
    setTimeout(() => {
        line.classList.add("show");
    }, delay * (index + 1));
});

/* 🔥 MODO EXTREMO (piscar tipo ritual) */
setInterval(() => {
    document.body.style.opacity = (Math.random() > 0.9) ? "0.85" : "1";
}, 200);
</script>

</body>
</html>
